services:
  mysql:
    image: mysql:8.4
    container_name: yolofarm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-yolofarm}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  ai-api:
    build:
      context: ./server/AI_feature
      dockerfile: Dockerfile
    container_name: yolofarm-ai-api
    restart: unless-stopped
    environment:
      PORT: 8000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-yolofarm}
      DB_SSL: "false"
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-yolofarm_dev_ai_token}
      MODEL_ARTIFACT_PATH: artifacts/models/humidity_gru.pt
      HISTORY_HOURS_DEFAULT: ${HISTORY_HOURS_DEFAULT:-720}
      LOOKBACK_STEPS: ${LOOKBACK_STEPS:-96}
      MC_DROPOUT_SAMPLES: ${MC_DROPOUT_SAMPLES:-10}
    ports:
      - "${AI_API_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: yolofarm-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-yolofarm}
      DB_SSL: "false"
      AI_API_URL: http://ai-api:8000
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-yolofarm_dev_ai_token}
      FORECAST_REQUEST_TIMEOUT_MS: ${FORECAST_REQUEST_TIMEOUT_MS:-30000}
      FORECAST_ALERT_DEBOUNCE_MS: ${FORECAST_ALERT_DEBOUNCE_MS:-900000}
      FORECAST_CACHE_TTL_MS: ${FORECAST_CACHE_TTL_MS:-600000}
      JWT_SECRET: ${JWT_SECRET:-yolofarm_docker_dev_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      AIO_USERNAME: ${AIO_USERNAME:-}
      AIO_KEY: ${AIO_KEY:-}
      AIO_FEED_TEMPERATURE: ${AIO_FEED_TEMPERATURE:-yolofarm.temperature}
      AIO_FEED_HUMIDITY: ${AIO_FEED_HUMIDITY:-yolofarm.humidity}
      AIO_FEED_SOIL_MOISTURE: ${AIO_FEED_SOIL_MOISTURE:-yolofarm.soil-moisture}
      AIO_FEED_LIGHT: ${AIO_FEED_LIGHT:-yolofarm.light}
      AIO_FEED_PUMP1: ${AIO_FEED_PUMP1:-yolofarm.pump1}
      AIO_FEED_PUMP2: ${AIO_FEED_PUMP2:-yolofarm.pump2}
      AIO_FEED_LED: ${AIO_FEED_LED:-yolofarm.led-rgb}
    ports:
      - "${SERVER_PORT:-5000}:5000"
    depends_on:
      mysql:
        condition: service_healthy
      ai-api:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: yolofarm-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-5173}:80"
    depends_on:
      - server

volumes:
  mysql_data:
